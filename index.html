<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Control - Simon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card-action { background: white; border-radius: 20px; transition: all 0.2s; border: 1px solid #e2e8f0; }
        .card-action:active { transform: scale(0.96); background: #f1f5f9; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-5">

    <div id="home-screen" class="max-w-md mx-auto">
        <header class="mb-8 pt-4">
            <h1 class="text-3xl font-black text-slate-900">Mi Stock</h1>
            <p class="text-slate-500">Gestión de Movimientos</p>
        </header>

        <div class="grid gap-4">
            <div onclick="showPage('movimientos')" class="card-action p-6 flex items-center gap-4 cursor-pointer">
                <div class="w-12 h-12 bg-emerald-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-emerald-200">
                    <i class="fas fa-plus-minus"></i>
                </div>
                <div>
                    <h3 class="font-bold text-slate-800">Cargar Movimiento</h3>
                    <p class="text-xs text-slate-400">Registrar entrada o salida</p>
                </div>
            </div>

            <div onclick="showPage('productos')" class="card-action p-6 flex items-center gap-4 cursor-pointer">
                <div class="w-12 h-12 bg-blue-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <i class="fas fa-boxes-stacked"></i>
                </div>
                <div>
                    <h3 class="font-bold text-slate-800">Ver Productos</h3>
                    <p class="text-xs text-slate-400">Lista de stock actual</p>
                </div>
            </div>
        </div>
        
        <footer class="mt-20 text-center">
            <span class="text-[10px] text-slate-300 uppercase tracking-widest font-bold">Banco Provincia Connection Active</span>
        </footer>
    </div>

    <div id="movimientos-screen" class="hidden max-w-md mx-auto">
        <button onclick="showPage('home')" class="mb-6 text-slate-400 font-medium flex items-center gap-2">
            <i class="fas fa-chevron-left"></i> Volver
        </button>
        
        <div class="bg-white p-6 rounded-[24px] shadow-sm border border-slate-100">
            <h2 class="text-xl font-bold text-slate-800 mb-6">Nuevo Registro</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Tipo</label>
                    <select id="tipoMov" class="w-full p-4 bg-slate-50 rounded-xl border-none outline-none font-bold text-slate-700">
                        <option value="Entrada">Entrada (+)</option>
                        <option value="Salida">Salida (-)</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Producto</label>
                    <input type="text" id="prodNombre" placeholder="Nombre exacto del producto" class="w-full p-4 bg-slate-50 rounded-xl border-none outline-none">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Cantidad</label>
                    <input type="number" id="prodCant" placeholder="0" class="w-full p-4 bg-slate-50 rounded-xl border-none outline-none font-mono">
                </div>

                <button onclick="enviarDato()" id="btnSave" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold mt-4 shadow-xl active:bg-slate-800">
                    Guardar en MOVIMIENTOS
                </button>
            </div>
        </div>
    </div>

    <div id="productos-screen" class="hidden max-w-md mx-auto">
        <button onclick="showPage('home')" class="mb-6 text-slate-400 font-medium flex items-center gap-2"><i class="fas fa-chevron-left"></i> Volver</button>
        <h2 class="text-xl font-bold text-slate-800 mb-4">Lista de Productos</h2>
        <div id="lista-prods" class="space-y-2 text-sm text-slate-500 italic">
            Consultando la tabla PRODUCTOS...
        </div>
    </div>

    <script>
        // Tus credenciales configuradas
        const CONFIG = {
            appId: "927a8f4f-34af-4e0e-8e19-4b304e84b1d2",
            key: "V2-SU8cK-s6uVM-8A6K8-gor0L-f0sTx-hSJ2F-FLhOW-dgmLx",
            tabla: "MOVIMIENTOS"
        };

        function showPage(p) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('movimientos-screen').classList.add('hidden');
            document.getElementById('productos-screen').classList.add('hidden');
            document.getElementById(p + '-screen').classList.remove('hidden');
        }

        async function enviarDato() {
            const btn = document.getElementById('btnSave');
            const producto = document.getElementById('prodNombre').value;
            const cantidad = document.getElementById('prodCant').value;
            const tipo = document.getElementById('tipoMov').value;

            if(!producto || !cantidad) return alert("Simon, completá los datos primero");

            btn.disabled = true;
            btn.innerText = "Sincronizando...";

            // El Body coincide con las columnas de tu imagen
            const payload = {
                "Action": "Add",
                "Properties": { "Locale": "es-AR" },
                "Rows": [{
                    "PRODUCTO": producto, 
                    "CANTIDAD": parseInt(cantidad),
                    "TIPO": tipo,
                    "FECHA": new Date().toLocaleString('es-AR')
                }]
            };

            try {
                const res = await fetch(`https://api.appsheet.com/api/v2/apps/${CONFIG.appId}/tables/${CONFIG.tabla}/Action`, {
                    method: 'POST',
                    headers: { 'ApplicationAccessKey': CONFIG.key, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    alert("¡Listo! Ya se guardó en el historial.");
                    location.reload();
                }
            } catch (e) {
                alert("Error de conexión");
            } finally {
                btn.disabled = false;
                btn.innerText = "Guardar en MOVIMIENTOS";
            }
        }
    </script>
</body>
</html>
