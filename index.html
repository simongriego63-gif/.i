<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock App - Gestor de Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f7f9; font-family: 'Inter', sans-serif; }
        .app-card { background: white; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); transition: all 0.3s ease; }
        .app-card:active { transform: scale(0.98); }
        .icon-box { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">

    <div id="home-screen" class="max-w-md mx-auto">
        <header class="text-center mb-10 mt-6">
            <h1 class="text-4xl font-extrabold text-slate-800">Stock App</h1>
            <p class="text-slate-500 mt-2">Gestión de inventario simplificada</p>
        </header>

        <div class="space-y-4">
            <div onclick="showPage('movimientos')" class="app-card p-5 flex items-center justify-between cursor-pointer border border-slate-50">
                <div class="flex items-center gap-4">
                    <div class="icon-box bg-emerald-500 shadow-lg shadow-emerald-100">
                        <i class="fas fa-exchange-alt"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-700 text-lg">Registrar Movimientos</h3>
                        <p class="text-sm text-slate-400">Entradas y salidas de stock</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-slate-300"></i>
            </div>

            <div onclick="showPage('productos')" class="app-card p-5 flex items-center justify-between cursor-pointer border border-slate-50">
                <div class="flex items-center gap-4">
                    <div class="icon-box bg-blue-500 shadow-lg shadow-blue-100">
                        <i class="fas fa-box"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-700 text-lg">Productos</h3>
                        <p class="text-sm text-slate-400">Gestiona tu inventario</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-slate-300"></i>
            </div>

            <div onclick="showPage('historial')" class="app-card p-5 flex items-center justify-between cursor-pointer border border-slate-50">
                <div class="flex items-center gap-4">
                    <div class="icon-box bg-purple-500 shadow-lg shadow-purple-100">
                        <i class="fas fa-history"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-700 text-lg">Historial</h3>
                        <p class="text-sm text-slate-400">Revisa movimientos pasados</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-slate-300"></i>
            </div>
        </div>
    </div>

    <div id="movimientos-screen" class="hidden max-w-md mx-auto">
        <button onclick="showPage('home')" class="text-slate-400 mb-6 flex items-center gap-2">
            <i class="fas fa-arrow-left"></i> Volver
        </button>
        <h2 class="text-2xl font-bold text-slate-800 mb-6">Registrar Movimiento</h2>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <button class="bg-white border-2 border-emerald-500 text-emerald-600 p-6 rounded-3xl font-bold flex flex-col items-center gap-2 shadow-sm">
                <i class="fas fa-arrow-circle-down text-2xl"></i> Entrada
            </button>
            <button class="bg-white border-2 border-slate-100 text-slate-400 p-6 rounded-3xl font-bold flex flex-col items-center gap-2 shadow-sm">
                <i class="fas fa-arrow-circle-up text-2xl"></i> Salida
            </button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-slate-500 text-sm mb-2 ml-2">Producto</label>
                <select class="w-full p-4 bg-white border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500/20 shadow-sm">
                    <option>Selecciona un producto</option>
                </select>
            </div>
            <div>
                <label class="block text-slate-500 text-sm mb-2 ml-2">Cantidad</label>
                <input type="number" placeholder="0" class="w-full p-4 bg-white border border-slate-100 rounded-2xl outline-none shadow-sm">
            </div>
            <button class="w-full bg-emerald-500 text-white p-5 rounded-2xl font-bold text-lg shadow-lg shadow-emerald-200 mt-4 active:scale-95 transition-transform">
                Guardar Stock
            </button>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('movimientos-screen').classList.add('hidden');
            document.getElementById(pageId + '-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
