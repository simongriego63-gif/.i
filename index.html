<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock App - Simon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card-action { background: white; border-radius: 20px; transition: all 0.2s; border: 1px solid #e2e8f0; cursor: pointer; }
        .card-action:active { transform: scale(0.96); background: #f1f5f9; }
        .hidden { display: none; }
        .btn-tipo { border: 2px solid #e2e8f0; transition: all 0.2s; }
        .btn-active-entrada { border-color: #10b981; background-color: #ecfdf5; color: #059669; }
        .btn-active-salida { border-color: #ef4444; background-color: #fef2f2; color: #dc2626; }
    </style>
</head>
<body class="p-5">

    <div id="home-screen" class="max-w-md mx-auto">
        <header class="mb-8 pt-4">
            <h1 class="text-3xl font-black text-slate-900">Mi Stock</h1>
            <p class="text-slate-500">Panel de Control</p>
        </header>

        <div class="grid gap-4">
            <div onclick="abrirCarga()" class="card-action p-6 flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-emerald-200">
                    <i class="fas fa-plus-minus"></i>
                </div>
                <div>
                    <h3 class="font-bold text-slate-800">Cargar Movimiento</h3>
                    <p class="text-xs text-slate-400">Registrar entrada o salida</p>
                </div>
            </div>

            <div onclick="verHistorial()" class="card-action p-6 flex items-center gap-4">
                <div class="w-12 h-12 bg-purple-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-purple-200">
                    <i class="fas fa-history"></i>
                </div>
                <div>
                    <h3 class="font-bold text-slate-800">Historial de Movimientos</h3>
                    <p class="text-xs text-slate-400">Ver registros pasados</p>
                </div>
            </div>
        </div>
    </div>

    <div id="movimientos-screen" class="hidden max-w-md mx-auto">
        <button onclick="showPage('home')" class="mb-6 text-slate-400 font-medium flex items-center gap-2">
            <i class="fas fa-chevron-left"></i> Volver
        </button>
        
        <div class="bg-white p-6 rounded-[24px] shadow-sm border border-slate-100">
            <h2 class="text-xl font-bold text-slate-800 mb-6">Nuevo Registro</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Seleccionar Tipo</label>
                    <div class="grid grid-cols-2 gap-3 mt-2">
                        <button id="tipo-entrada" onclick="setTipo('Entrada')" class="btn-tipo p-4 rounded-xl font-bold text-slate-400">
                            <i class="fas fa-arrow-up mr-2"></i>Entrada
                        </button>
                        <button id="tipo-salida" onclick="setTipo('Salida')" class="btn-tipo p-4 rounded-xl font-bold text-slate-400">
                            <i class="fas fa-arrow-down mr-2"></i>Salida
                        </button>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Producto</label>
                    <select id="selectProducto" class="w-full p-4 bg-slate-50 rounded-xl border-none outline-none font-medium mt-2">
                        <option value="">Cargando productos...</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Cantidad</label>
                    <input type="number" id="prodCant" placeholder="0" class="w-full p-4 bg-slate-50 rounded-xl border-none outline-none font-mono mt-2">
                </div>

                <button onclick="enviarDato()" id="btnSave" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold mt-4 shadow-xl">
                    Guardar Movimiento
                </button>
            </div>
        </div>
    </div>

    <div id="historial-screen" class="hidden max-w-md mx-auto">
        <button onclick="showPage('home')" class="mb-6 text-slate-400 font-medium flex items-center gap-2"><i class="fas fa-chevron-left"></i> Volver</button>
        <h2 class="text-xl font-bold text-slate-800 mb-4">Últimos Movimientos</h2>
        <div id="lista-historial" class="space-y-3">
            </div>
    </div>

    <script>
        const CONFIG = {
            appId: "927a8f4f-34af-4e0e-8e19-4b304e84b1d2",
            key: "V2-SU8cK-s6uVM-8A6K8-gor0L-f0sTx-hSJ2F-FLhOW-dgmLx",
            tablaMov: "MOVIMIENTOS",
            tablaProd: "PRODUCTOS"
        };

        let tipoActual = "";

        function showPage(p) {
            document.querySelectorAll('div[id$="-screen"]').forEach(d => d.classList.add('hidden'));
            document.getElementById(p + '-screen').classList.remove('hidden');
        }

        function setTipo(t) {
            tipoActual = t;
            const bE = document.getElementById('tipo-entrada');
            const bS = document.getElementById('tipo-salida');
            bE.className = t === 'Entrada' ? "btn-tipo p-4 rounded-xl font-bold btn-active-entrada" : "btn-tipo p-4 rounded-xl font-bold text-slate-400";
            bS.className = t === 'Salida' ? "btn-tipo p-4 rounded-xl font-bold btn-active-salida" : "btn-tipo p-4 rounded-xl font-bold text-slate-400";
        }

        // CARGAR PRODUCTOS DESDE APPSHEET
        async function abrirCarga() {
            showPage('movimientos');
            const select = document.getElementById('selectProducto');
            
            try {
                const res = await fetch(`https://api.appsheet.com/api/v2/apps/${CONFIG.appId}/tables/${CONFIG.tablaProd}/Action`, {
                    method: 'POST',
                    headers: { 'ApplicationAccessKey': CONFIG.key, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "Action": "Find", "Properties": { "Locale": "es-AR" }, "Rows": [] })
                });
                const data = await res.json();
                select.innerHTML = '<option value="">Seleccionar producto</option>';
                data.forEach(p => {
                    const nombre = p.PRODUCTO || p.NOMBRES || p.Nombre; // Ajuste según tu Excel
                    select.innerHTML += `<option value="${nombre}">${nombre}</option>`;
                });
            } catch (e) { select.innerHTML = '<option>Error al cargar</option>'; }
        }

        // VER HISTORIAL
        async function verHistorial() {
            showPage('historial');
            const lista = document.getElementById('lista-historial');
            lista.innerHTML = '<p class="text-center text-slate-400 p-10 italic">Buscando en el Excel...</p>';
            
            try {
                const res = await fetch(`https://api.appsheet.com/api/v2/apps/${CONFIG.appId}/tables/${CONFIG.tablaMov}/Action`, {
                    method: 'POST',
                    headers: { 'ApplicationAccessKey': CONFIG.key, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "Action": "Find", "Properties": { "Locale": "es-AR" }, "Rows": [] })
                });
                const data = await res.json();
                lista.innerHTML = "";
                data.reverse().slice(0, 15).forEach(m => {
                    const color = m.TIPO === 'Entrada' ? 'text-emerald-500' : 'text-red-500';
                    lista.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-slate-50">
                            <div>
                                <p class="font-bold text-slate-800">${m.PRODUCTO}</p>
                                <p class="text-[10px] text-slate-400">${m.FECHA}</p>
                            </div>
                            <p class="font-black ${color}">${m.TIPO === 'Entrada' ? '+' : '-'}${m.CANTIDAD}</p>
                        </div>`;
                });
            } catch (e) { lista.innerHTML = '<p>Error al cargar historial</p>'; }
        }

        async function enviarDato() {
            const btn = document.getElementById('btnSave');
            const producto = document.getElementById('selectProducto').value;
            const cantidad = document.getElementById('prodCant').value;

            if(!producto || !cantidad || !tipoActual) return alert("Simon, completá todo.");

            btn.disabled = true;
            btn.innerText = "Sincronizando...";

            const payload = {
                "Action": "Add",
                "Properties": { "Locale": "es-AR" },
                "Rows": [{
                    "PRODUCTO": producto, 
                    "CANTIDAD": parseInt(cantidad),
                    "TIPO": tipoActual,
                    "FECHA": new Date().toLocaleString('es-AR')
                }]
            };

            try {
                const res = await fetch(`https://api.appsheet.com/api/v2/apps/${CONFIG.appId}/tables/${CONFIG.tablaMov}/Action`, {
                    method: 'POST',
                    headers: { 'ApplicationAccessKey': CONFIG.key, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) { alert("¡Guardado!"); location.reload(); }
            } catch (e) { alert("Error de red"); } finally { btn.disabled = false; }
        }
    </script>
</body>
</html>
